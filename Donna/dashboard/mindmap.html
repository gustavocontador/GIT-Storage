<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donna — Mapa Mental de Capacidades (2026-03-26)</title>
<style>
  :root {
    --bg: #0a0a12;
    --card: #12121e;
    --border: #1e1e3a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --pink: #ec4899;
    --orange: #f97316;
    --text: #e2e8f0;
    --muted: #64748b;
    --gray: #475569;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  canvas {
    display: block;
    cursor: grab;
  }
  canvas:active { cursor: grabbing; }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    text-align: center;
    padding: 14px 20px;
    background: linear-gradient(180deg, rgba(10,10,18,0.95) 60%, transparent);
    z-index: 10;
    pointer-events: none;
  }
  #header h1 {
    font-size: 1.5em;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #header p { color: var(--muted); font-size: 0.85em; margin-top: 2px; }

  #legend {
    position: fixed;
    bottom: 20px; left: 20px;
    background: rgba(18,18,30,0.92);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    z-index: 10;
    font-size: 0.8em;
    backdrop-filter: blur(8px);
  }
  #legend .title { font-weight: 700; margin-bottom: 8px; font-size: 0.9em; color: var(--text); }
  #legend .item { display: flex; align-items: center; gap: 8px; margin: 5px 0; color: var(--muted); }
  #legend .dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  #legend .dot.active { background: var(--green); }
  #legend .dot.pending { background: var(--yellow); }
  #legend .dot.opportunity { background: transparent; border: 2px dashed var(--gray); }

  #stats {
    position: fixed;
    bottom: 20px; right: 20px;
    background: rgba(18,18,30,0.92);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    z-index: 10;
    font-size: 0.8em;
    backdrop-filter: blur(8px);
    text-align: right;
  }
  #stats .num { font-size: 1.6em; font-weight: 700; }
  #stats .label { color: var(--muted); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.5px; }
  #stats .row { display: flex; gap: 20px; justify-content: flex-end; }

  #controls {
    position: fixed;
    top: 80px; right: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }
  #controls button {
    width: 36px; height: 36px;
    background: rgba(18,18,30,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1.1em;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s;
  }
  #controls button:hover { border-color: var(--accent); }

  #tooltip {
    position: fixed;
    display: none;
    background: rgba(18,18,30,0.95);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 10px 14px;
    z-index: 20;
    max-width: 220px;
    font-size: 0.8em;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #tooltip .tt-title { font-weight: 700; margin-bottom: 4px; }
  #tooltip .tt-status { font-size: 0.85em; }
</style>
</head>
<body>

<div id="header">

<canvas id="canvas"></canvas>

  },

    color: '#ef4444',
    children: [
      { name: 'GitHub', status: 'active' },

      { name: 'Quality Shield', status: 'active' },
      { name: 'Hormozi (content)', status: 'active' },

      { name: 'Paralegal', status: 'active' },
      { name: 'Copy (11 agents)', status: 'active' },

      { name: 'Content Distillery', status: 'active' },
    ]
  }
];

// ─── Build tree ──────────────────────────────────────────────────────
const tree = {
  name: 'Donna',
  icon: '👩‍💼',
  isRoot: true,
  expanded: true,
  children: DOMAINS.map(d => ({
    ...d,
    expanded: true,
    children: d.children.map(c => ({ ...c, children: [] }))
  }))
};

// ─── Canvas setup ────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let cam = { x: 0, y: 0, zoom: 1 };
let dragging = false, dragStart = { x: 0, y: 0 }, camStart = { x: 0, y: 0 };
let hoveredNode = null;
const tooltip = document.getElementById('tooltip');
const DPR = window.devicePixelRatio || 1;

// Layout cache
let nodePositions = []; // { x, y, r, node, domainColor }

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

// ─── Drawing ─────────────────────────────────────────────────────────
function worldToScreen(wx, wy) {
  return {
    x: (wx - cam.x) * cam.zoom + W / 2,
    y: (wy - cam.y) * cam.zoom + H / 2
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / cam.zoom + cam.x,
    y: (sy - H / 2) / cam.zoom + cam.y
  };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function draw() {
  ctx.save();
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // Background with subtle grid
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);
  drawGrid();

  nodePositions = [];
  const cx = 0, cy = 0;

  // Draw domain branches
  const angleStep = (Math.PI * 2) / tree.children.length;
  const branchLen = 220;
  const leafSpread = 140;

  tree.children.forEach((domain, i) => {
    const angle = -Math.PI / 2 + i * angleStep;
    const dx = cx + Math.cos(angle) * branchLen;
    const dy = cy + Math.sin(angle) * branchLen;

    // Draw connection line to center
    const s1 = worldToScreen(cx, cy);
    const s2 = worldToScreen(dx, dy);
    drawCurvedLine(s1.x, s1.y, s2.x, s2.y, domain.color, 3);

    // Domain node
    const domR = 42 * cam.zoom;
    drawDomainNode(s2.x, s2.y, domR, domain, domain === hoveredNode);
    nodePositions.push({ x: dx, y: dy, r: 42, node: domain, domainColor: domain.color });

    // Children
    if (domain.expanded && domain.children.length > 0) {
      const childCount = domain.children.length;
      const arcSpan = Math.min(Math.PI * 0.55, childCount * 0.18);
      const startAngle = angle - arcSpan / 2;
      const childStep = childCount > 1 ? arcSpan / (childCount - 1) : 0;

      domain.children.forEach((child, j) => {
        const childAngle = childCount > 1 ? startAngle + j * childStep : angle;
        const dist = leafSpread + (j % 2 === 0 ? 0 : 20);
        const lx = dx + Math.cos(childAngle) * dist;
        const ly = dy + Math.sin(childAngle) * dist;

        const sl = worldToScreen(lx, ly);

        // Line from domain to child
        const isOpp = child.status === 'opportunity';
        drawCurvedLine(s2.x, s2.y, sl.x, sl.y, domain.color, isOpp ? 1.5 : 2, isOpp);

        // Child node
        const childR = 30 * cam.zoom;
        drawLeafNode(sl.x, sl.y, childR, child, domain.color, child === hoveredNode);
        nodePositions.push({ x: lx, y: ly, r: 30, node: child, domainColor: domain.color });
      });
    }
  });

  // Center node (Donna)
  const sc = worldToScreen(cx, cy);
  drawCenterNode(sc.x, sc.y, 55 * cam.zoom);
  nodePositions.push({ x: cx, y: cy, r: 55, node: tree, domainColor: '#7c3aed' });

  ctx.restore();
  updateStats();
}

function drawGrid() {
  const gridSize = 60 * cam.zoom;
  if (gridSize < 15) return;
  const offX = (-cam.x * cam.zoom + W / 2) % gridSize;
  const offY = (-cam.y * cam.zoom + H / 2) % gridSize;
  ctx.strokeStyle = 'rgba(30,30,58,0.4)';
  ctx.lineWidth = 0.5;
  for (let x = offX; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = offY; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawCurvedLine(x1, y1, x2, y2, color, width, dashed) {
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const dx = x2 - x1;
  const dy = y2 - y1;
  const cpx = mx - dy * 0.08;
  const cpy = my + dx * 0.08;

  ctx.save();
  ctx.strokeStyle = color + '66';
  ctx.lineWidth = width * cam.zoom;
  if (dashed) ctx.setLineDash([6 * cam.zoom, 4 * cam.zoom]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cpx, cpy, x2, y2);
  ctx.stroke();
  ctx.restore();
}

function drawCenterNode(x, y, r) {
  // Outer glow
  const grad = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 2.5);
  grad.addColorStop(0, 'rgba(124,58,237,0.15)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(x - r * 3, y - r * 3, r * 6, r * 6);

  // Pulsing ring
  const pulse = 1 + Math.sin(Date.now() / 800) * 0.04;
  ctx.beginPath();
  ctx.arc(x, y, r * pulse * 1.15, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(124,58,237,0.3)';
  ctx.lineWidth = 2 * cam.zoom;
  ctx.stroke();

  // Main circle
  const bg = ctx.createRadialGradient(x, y - r * 0.3, 0, x, y, r);
  bg.addColorStop(0, '#2d1a5e');
  bg.addColorStop(1, '#1a0a3a');
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = '#7c3aed';
  ctx.lineWidth = 3 * cam.zoom;
  ctx.stroke();

  // Icon
  ctx.font = `${r * 0.7}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('👩‍💼', x, y - r * 0.12);

  // Label
  ctx.font = `bold ${Math.max(11, r * 0.32)}px system-ui`;
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText('Donna', x, y + r * 0.55);
}

function drawDomainNode(x, y, r, domain, hovered) {
  const col = domain.color;
  const rgb = hexToRgb(col);

  // Glow on hover
  if (hovered) {
    const glow = ctx.createRadialGradient(x, y, r * 0.3, x, y, r * 2);
    glow.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.2)`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(x - r * 2.5, y - r * 2.5, r * 5, r * 5);
  }

  // Circle
  const bg = ctx.createRadialGradient(x, y - r * 0.2, 0, x, y, r);
  bg.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`);
  bg.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.08)`);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = hovered ? col : col + '99';
  ctx.lineWidth = (hovered ? 3 : 2) * cam.zoom;
  ctx.stroke();

  // Expand indicator
  if (domain.children && domain.children.length > 0) {
    const indR = 8 * cam.zoom;
    const indX = x + r * 0.7;
    const indY = y - r * 0.7;
    ctx.beginPath();
    ctx.arc(indX, indY, indR, 0, Math.PI * 2);
    ctx.fillStyle = '#12121e';
    ctx.fill();
    ctx.strokeStyle = col + '88';
    ctx.lineWidth = 1 * cam.zoom;
    ctx.stroke();
    ctx.font = `bold ${indR * 1.2}px system-ui`;
    ctx.fillStyle = col;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(domain.expanded ? '−' : '+', indX, indY);
  }

  // Icon
  ctx.font = `${r * 0.55}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(domain.icon, x, y - r * 0.12);

  // Label
  ctx.font = `bold ${Math.max(10, r * 0.28)}px system-ui`;
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText(domain.name, x, y + r * 0.5);

  // Counter
  const active = domain.children.filter(c => c.status === 'active').length;
  const opp = domain.children.filter(c => c.status === 'opportunity').length;
  ctx.font = `${Math.max(8, r * 0.22)}px system-ui`;
  ctx.fillStyle = '#64748b';
  ctx.fillText(`${active} ✓  ${opp} ◇`, x, y + r * 0.78);
}

function drawLeafNode(x, y, r, node, domainColor, hovered) {
  const isOpp = node.status === 'opportunity';
  const isPend = node.status === 'pending';
  const col = isOpp ? '#475569' : isPend ? '#eab308' : '#22c55e';
  const rgb = hexToRgb(domainColor);

  if (hovered) {
    const glow = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 1.8);
    glow.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(x - r * 2, y - r * 2, r * 4, r * 4);
  }

  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);

  if (isOpp) {
    ctx.fillStyle = 'rgba(30,30,58,0.5)';
    ctx.fill();
    ctx.save();
    ctx.setLineDash([4 * cam.zoom, 3 * cam.zoom]);
    ctx.strokeStyle = hovered ? '#94a3b8' : '#475569';
    ctx.lineWidth = (hovered ? 2.5 : 1.5) * cam.zoom;
    ctx.stroke();
    ctx.restore();
  } else {
    const bg = ctx.createRadialGradient(x, y - r * 0.2, 0, x, y, r);
    bg.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.18)`);
    bg.addColorStop(1, 'rgba(18,18,30,0.9)');
    ctx.fillStyle = bg;
    ctx.fill();
    ctx.strokeStyle = hovered ? col : col + '88';
    ctx.lineWidth = (hovered ? 2.5 : 1.5) * cam.zoom;
    ctx.stroke();
  }

  // Status dot
  const dotR = 4 * cam.zoom;
  const dotX = x + r * 0.6;
  const dotY = y - r * 0.6;
  ctx.beginPath();
  ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
  if (isOpp) {
    ctx.save();
    ctx.setLineDash([2 * cam.zoom, 2 * cam.zoom]);
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 1 * cam.zoom;
    ctx.stroke();
    ctx.restore();
  } else {
    ctx.fillStyle = col;
    ctx.fill();
  }

  // Label
  const fontSize = Math.max(8, r * 0.33);
  ctx.font = `${isOpp ? '' : 'bold '}${fontSize}px system-ui`;
  ctx.fillStyle = isOpp ? '#64748b' : '#e2e8f0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Wrap text
  const words = node.name.split(' ');
  if (words.length > 2 && ctx.measureText(node.name).width > r * 1.8) {
    const mid = Math.ceil(words.length / 2);
    const line1 = words.slice(0, mid).join(' ');
    const line2 = words.slice(mid).join(' ');
    ctx.fillText(line1, x, y - fontSize * 0.35);
    ctx.fillText(line2, x, y + fontSize * 0.55);
  } else {
    ctx.fillText(node.name, x, y + 1);
  }
}

// ─── Stats ───────────────────────────────────────────────────────────
function updateStats() {
  let totalActive = 0, totalOpp = 0, totalPend = 0;
  tree.children.forEach(d => {
    d.children.forEach(c => {
      if (c.status === 'active') totalActive++;
      else if (c.status === 'opportunity') totalOpp++;
      else if (c.status === 'pending') totalPend++;
    });
  });
  document.getElementById('stats').innerHTML = `
    <div class="row">
      <div>
        <div class="num" style="color:var(--green)">${totalActive}</div>
        <div class="label">Ativas</div>
      </div>
      <div>
        <div class="num" style="color:var(--yellow)">${totalPend}</div>
        <div class="label">Pendentes</div>
      </div>
      <div>
        <div class="num" style="color:var(--gray)">${totalOpp}</div>
        <div class="label">Oportunidades</div>
      </div>
    </div>
    <div style="color:var(--muted);font-size:0.75em;margin-top:8px">${tree.children.length} domínios</div>
  `;
}

// ─── Interaction ─────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  camStart = { x: cam.x, y: cam.y };
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    cam.x = camStart.x - (e.clientX - dragStart.x) / cam.zoom;
    cam.y = camStart.y - (e.clientY - dragStart.y) / cam.zoom;
    draw();
    return;
  }

  // Hover detection
  const world = screenToWorld(e.clientX, e.clientY);
  let found = null;
  for (let i = nodePositions.length - 1; i >= 0; i--) {
    const np = nodePositions[i];
    const dx = world.x - np.x;
    const dy = world.y - np.y;
    if (dx * dx + dy * dy < np.r * np.r) {
      found = np.node;
      break;
    }
  }

  if (found !== hoveredNode) {
    hoveredNode = found;
    canvas.style.cursor = found && !found.isRoot ? 'pointer' : (found ? 'grab' : 'grab');
    draw();
  }

  // Tooltip
  if (found && !found.isRoot && found.children === undefined) {
    const tt = document.getElementById('tooltip');
    tt.style.display = 'block';
    tt.style.left = (e.clientX + 16) + 'px';
    tt.style.top = (e.clientY - 10) + 'px';
    tt.querySelector('.tt-title').textContent = found.name;
    const statusText = found.status === 'active' ? '✅ Ativo' :
                       found.status === 'pending' ? '⏳ Pendente' : '💡 Oportunidade';
    tt.querySelector('.tt-status').textContent = statusText;
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseup', e => {
  if (dragging) {
    const moved = Math.abs(e.clientX - dragStart.x) + Math.abs(e.clientY - dragStart.y);
    if (moved < 5 && hoveredNode && !hoveredNode.isRoot && hoveredNode.children !== undefined) {
      hoveredNode.expanded = !hoveredNode.expanded;
      draw();
    }
  }
  dragging = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  const newZoom = Math.max(0.3, Math.min(3, cam.zoom * factor));

  // Zoom toward cursor
  const wx = (e.clientX - W / 2) / cam.zoom + cam.x;
  const wy = (e.clientY - H / 2) / cam.zoom + cam.y;
  cam.zoom = newZoom;
  cam.x = wx - (e.clientX - W / 2) / cam.zoom;
  cam.y = wy - (e.clientY - H / 2) / cam.zoom;

  draw();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    camStart = { x: cam.x, y: cam.y };
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    cam.x = camStart.x - (e.touches[0].clientX - dragStart.x) / cam.zoom;
    cam.y = camStart.y - (e.touches[0].clientY - dragStart.y) / cam.zoom;
    draw();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const factor = dist / lastTouchDist;
    cam.zoom = Math.max(0.3, Math.min(3, cam.zoom * factor));
    lastTouchDist = dist;
    draw();
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  dragging = false;
});

// ─── Controls ────────────────────────────────────────────────────────
function zoomIn() {
  cam.zoom = Math.min(3, cam.zoom * 1.25);
  draw();
}

function zoomOut() {
  cam.zoom = Math.max(0.3, cam.zoom * 0.8);
  draw();
}

function resetView() {
  cam = { x: 0, y: 0, zoom: 1 };
  draw();
}

let allExpanded = true;
function toggleAll() {
  allExpanded = !allExpanded;
  tree.children.forEach(d => d.expanded = allExpanded);
  document.getElementById('toggleBtn').textContent = allExpanded ? '⊞' : '⊟';
  draw();
}

// ─── Animation loop (for pulse) ──────────────────────────────────────
function animate() {
  draw();
  requestAnimationFrame(animate);
}

// ─── Init ────────────────────────────────────────────────────────────
resize();
animate();
</script>
</body>
</html>
